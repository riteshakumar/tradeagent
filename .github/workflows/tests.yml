name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  # Stub credentials so config.py doesn't raise on import
  ALPACA_API_KEY: "test_key"
  ALPACA_SECRET_KEY: "test_secret"
  OPENAI_API_KEY: "test_openai"
  ANTHROPIC_API_KEY: "test_anthropic"
  PAPER_TRADING: "true"
  DRY_RUN: "true"
  USE_AGENT: "false"
  AGENT_PROVIDER: "none"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # ── Unit tests: pure logic, no network ────────────────────────────────────────
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest -m "not e2e" \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── E2E tests: full pipeline, all IO mocked ───────────────────────────────────
  e2e:
    name: E2E tests (Python 3.12)
    runs-on: ubuntu-latest
    needs: unit   # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run e2e tests
        run: pytest -m e2e -v

  # ── Lint: catch import errors and syntax issues ───────────────────────────────
  lint:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check all modules parse cleanly
        run: |
          python -c "
          import ast, sys, pathlib
          files = [p for p in pathlib.Path('.').glob('*.py') if 'venv' not in str(p)]
          failed = []
          for f in files:
              try:
                  ast.parse(f.read_text())
                  print(f'  OK  {f}')
              except SyntaxError as e:
                  print(f'  ERR {f}: {e}')
                  failed.append(str(f))
          if failed:
              sys.exit(1)
          "
