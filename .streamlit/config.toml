# Unified with the dashboard glass theme (dashboard.py CSS vars).
# Palette: navy glass surfaces, cyan accent, Manrope body / JetBrains Mono data.

[theme]
base = "dark"

# Colors — mirror dashboard.py :root tokens
primaryColor             = "#22d3ee"   # --accent
backgroundColor          = "#0a1428"   # --bg-1
secondaryBackgroundColor = "#0f1d38"   # --bg-2
textColor                = "#e8eef9"   # --text-main
linkColor                = "#38bdf8"   # --accent-2

# Widgets
showWidgetBorder = true
borderColor      = "#263a57"           # --border-0

# Dataframes
dataframeHeaderBackgroundColor = "#0f1d38"
dataframeBorderColor           = "#263a57"

# Typography — Manrope everywhere, JetBrains Mono for code/data
font     = "'Manrope':https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap"
baseFontWeight = 400
baseFontSize   = 14
headingFont    = "Manrope"
